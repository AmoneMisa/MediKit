# MediKit — reverse-proxy snippet for the HOST nginx.
#
# The host nginx already terminates TLS on 443 for whiteslove.me and proxies each
# app to its own localhost port (myproject → :8080/:8081, medikit → :4000). This is
# NOT a standalone server block: paste the `location /medikit/` below INTO the
# existing `server { listen 443 ssl; server_name whiteslove.me; ... }` block,
# before any catch-all `location /`.
#
# The trailing slash on proxy_pass strips the /medikit prefix:
#   /medikit/api/kits  ->  /api/kits
#   /medikit/ws        ->  /ws
# Remove that slash and routing breaks.
#
# The Upgrade/Connection headers are required for the realtime /ws WebSocket sync;
# without them REST works but live updates silently fall back to pull-only.

location /medikit/ {
    proxy_pass http://127.0.0.1:4000/;

    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_read_timeout 3600s;   # keep long-lived WebSockets alive
}
